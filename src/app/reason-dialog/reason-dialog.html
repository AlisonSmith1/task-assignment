<h2 mat-dialog-title>回溯原因</h2>
<mat-dialog-content>
  <mat-form-field appearance="fill">
    <mat-label>請輸入原因</mat-label>
    <input matInput [(ngModel)]="reasonText" />
    @if (reasonText && reasonText.length <= 4) {
      <mat-hint>請至少輸入 5 個字 (目前: {{ reasonText.length }})</mat-hint>
    }
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close cdkFocusInitial>取消</button>
  <button
    mat-button
    [mat-dialog-close]="{ reason: reasonText }"
    [disabled]="!reasonText || reasonText.length <= 4"
  >
    確認
  </button>
</mat-dialog-actions>
